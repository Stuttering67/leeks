plugins {
    id 'java'
    id 'org.jetbrains.intellij' version '1.17.3'
}

// Use Huawei mirror for JetBrains IntelliJ SDK
repositories {
    maven { url 'https://mirrors.huaweicloud.com/repository/maven/' }
    maven { url 'https://maven.aliyun.com/repository/public' }
    maven { url 'https://maven.aliyun.com/repository/google' }
    mavenCentral()
}

group 'com.huage2580'
version '5.0.0'

java {
    sourceCompatibility = '17'
    targetCompatibility = '17'
}


repositories {
    mavenCentral()
    maven { url 'https://maven.aliyun.com/repository/public' }
    maven { url 'https://maven.aliyun.com/repository/google' }

    jcenter()
    maven { url 'https://jitpack.io' } // 添加 JitPack 仓库

}

// Configure IntelliJ Platform SDK repository mirror
intellij {
    // Use version-based SDK (need java-compiler for form compilation)
    version.set('2023.1')
    type.set('IC')
    intellij.setUpdateSinceUntilBuild(false)
    intellij.setSameSinceUntilBuild(false)
}

dependencies {
    testImplementation group: 'junit', name: 'junit', version: '4.12'
    implementation 'com.github.promeg:tinypinyin:2.0.3' // TinyPinyin核心包，约80KB
    implementation group: 'org.quartz-scheduler', name: 'quartz', version: '2.3.2', {
        exclude group: 'com.zaxxer'
        exclude group: 'org.slf4j' // 与idea自带的冲突
        exclude group: 'com.mchange'
    }
    //fastjson
    implementation group: 'com.alibaba', name: 'fastjson', version: '2.0.38'
    compileOnly(group: 'org.projectlombok', name: 'lombok', version: '1.18.30')
    annotationProcessor(group: 'org.projectlombok', name: 'lombok', version: '1.18.30')
}

