// Add a task to generate ZIP and print path for CI/automation
tasks.register('bumpAndBuildPlugin') {
    group = 'release'
    description = 'Convenience task: increment patch and build plugin (wrapper around buildPlugin).'
    dependsOn tasks.named('incrementPluginPatchVersion')
    dependsOn tasks.named('buildPlugin')
}

