tasks.withType(JavaCompile) {
    options.encoding = "UTF-8"
}
buildSearchableOptions.enabled = false

// Auto-increment plugin patch version before packaging
def versionPattern = ~/(?m)^[ \t]*version\s*['"](\d+)\.(\d+)\.(\d+)['"]/ 
tasks.register('incrementPluginPatchVersion') {
    group = 'release'
    description = 'Increment plugin patch version by 0.0.1 and update build.gradle and plugin.xml.'
    doLast {
        def buildFile = file('build.gradle')
        def text = buildFile.getText('UTF-8')
        def matcher = (text =~ versionPattern)
        if (!matcher) {
            println "No version pattern found in build.gradle, skipping increment."
            return
        }
        def major = matcher[0][1].toInteger()
        def minor = matcher[0][2].toInteger()
        def patch = matcher[0][3].toInteger()
        def newPatch = patch + 1
        def newVersion = "${major}.${minor}.${newPatch}"
        // Update project version for this build
        project.version = newVersion
        // Persist new version to build.gradle for future builds
        def newText = text.replaceFirst(versionPattern, "version '${newVersion}'")
        buildFile.withWriter('UTF-8') { it.write(newText) }
        println "Updated build.gradle version to ${newVersion}"
        // Update src plugin.xml display version if present
        def pluginXmlFile = file('src/main/resources/META-INF/plugin.xml')
        if (pluginXmlFile.exists()) {
            def px = pluginXmlFile.getText('UTF-8')
            if (px =~ /<version>.*<\/version>/) {
                px = px.replaceFirst(/<version>.*<\/version>/, "<version>${newVersion}</version>")
            } else if (px =~ /<name>.*<\/name>/) {
                def nl = System.getProperty('line.separator')
                px = px.replaceFirst(/(<name>.*?<\/name>)/, '\\$1' + nl + '    <version>' + newVersion + '</version>')
            }
            pluginXmlFile.withWriter('UTF-8') { it.write(px) }
            println "Updated plugin.xml version to ${newVersion}"
        } else {
            println "plugin.xml not found at src/main/resources/META-INF/plugin.xml"
        }
    }
}

// Ensure increment runs before patching plugin xml and building plugin
